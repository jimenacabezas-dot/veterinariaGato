<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeterinariaGato</title>
       <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            color: #60a0ac;
        }

        /* HEADER */
        header {
            background-color: #2c7a7b;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5rem;
        }

        /* NAV */
        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* MAIN */
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            margin-bottom: 2.5rem;
        }

        section h2 {
            color: #36797a;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid #2c7a7b;
            padding-bottom: 0.3rem;
        }

        /* FOOTER */
        footer {
            background-color: #62bba5;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
    </style>

</head>
<body>
    <header><h1>🐾 VeterinariaGato</h1>
    <nav>
            <ul>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#sobre-mi">Sobre mí</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>

    </main>
    <footer>

    </footer>
</body>
</html>
